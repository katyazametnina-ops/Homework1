<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p class="paragraph">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Atque non
      suscipit doloremque porro nostrum, placeat itaque modi rem exercitationem
      eveniet aut impedit quos, unde temporibus!
    </p>
    <button class="btn">Изменить цвет</button>
    <script>
      const paragraphEl = document.querySelector(".paragraph");
      const btnEl = document.querySelector(".btn");

      btnEl.addEventListener('click', () => {
        paragraphEl.style.color = 'blue';
      })
    </script>
  </body>
</html>
